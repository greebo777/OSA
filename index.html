<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSA Sport</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" sizes="192x192" href="icon-192.png">
  <meta name="theme-color" content="#4CAF50">
  <style>
    :root, [data-theme="light"] {
      --bg: #f4f4f4; --surface: #ffffff; --surface2: #eeeeee;
      --text: #222; --text-muted: #666; --border: #ddd;
      --accent: #4CAF50; --accent-dark: #388E3C;
      --btn-pause: #f57c00; --btn-stop: #e53935;
      --work-color: #fff9c4; --pause-color: #c8e6c9;
      --active-row: #ffe082; --done-row: #eee; --done-text: #999;
      --shadow: 0 2px 8px rgba(0,0,0,0.10);
      --nav-h: 56px; --drawer-w: 280px;
    }
    [data-theme="dark"] {
      --bg: #1a1a2e; --surface: #16213e; --surface2: #0f3460;
      --text: #e0e0e0; --text-muted: #9e9e9e; --border: #2a2a4a;
      --accent: #4CAF50; --accent-dark: #66BB6A;
      --btn-pause: #f57c00; --btn-stop: #ef5350;
      --work-color: #2e2a00; --pause-color: #0a2e0a;
      --active-row: #4a3900; --done-row: #2a2a2a; --done-text: #666;
      --shadow: 0 2px 8px rgba(0,0,0,0.40);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body { min-height: 100%; font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text); transition: background .3s, color .3s;
      display: flex; flex-direction: column; }

    /* NAV */
    .nav { position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h);
      background: var(--surface); border-bottom: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; z-index: 100; box-shadow: var(--shadow); }
    .nav-title { font-size: 1.3rem; font-weight: 700; color: var(--accent); cursor: pointer; }
    .nav-btn { width: 44px; height: 44px; display: flex; align-items: center;
      justify-content: center; background: none; border: none; cursor: pointer;
      font-size: 1.4rem; color: var(--text); border-radius: 8px; transition: background .2s; }
    .nav-btn:hover { background: var(--surface2); }

    /* DRAWER */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200;
      opacity: 0; pointer-events: none; transition: opacity .3s; }
    .overlay.open { opacity: 1; pointer-events: auto; }
    .drawer { position: fixed; top: 0; right: 0; width: var(--drawer-w); max-width: 85vw;
      height: 100%; background: var(--surface); z-index: 201;
      transform: translateX(100%); transition: transform .3s;
      display: flex; flex-direction: column; box-shadow: -4px 0 16px rgba(0,0,0,.2);
      overflow-y: auto; }
    .drawer.open { transform: translateX(0); }
    .drawer-header { padding: 20px 16px 12px; border-bottom: 1px solid var(--border);
      font-size: 1.1rem; font-weight: 700; color: var(--accent); }
    .drawer-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px;
      cursor: pointer; border: none; background: none; color: var(--text);
      font-size: .95rem; text-align: left; width: 100%; min-height: 48px;
      border-bottom: 1px solid var(--border); transition: background .2s; }
    .drawer-item:hover { background: var(--surface2); }
    .drawer-setting { padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .drawer-setting-label { display: flex; align-items: center; justify-content: space-between;
      font-size: .88rem; color: var(--text-muted); margin-bottom: 6px; }
    .toggle { appearance: none; width: 44px; height: 24px; background: var(--border);
      border-radius: 12px; position: relative; cursor: pointer; flex-shrink: 0;
      transition: background .3s; }
    .toggle::after { content: ''; position: absolute; top: 3px; left: 3px;
      width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: left .3s; }
    .toggle:checked { background: var(--accent); }
    .toggle:checked::after { left: 23px; }
    #vol-slider { width: 100%; accent-color: var(--accent); cursor: pointer; }

    /* MAIN */
    .main { margin-top: var(--nav-h); min-height: calc(100vh - var(--nav-h));
      padding: 16px 16px 80px; max-width: 700px; margin-left: auto; margin-right: auto; }

    /* SHARED COMPONENTS */
    .view-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .view-title { font-size: 1.1rem; font-weight: 700; }
    .section-label { font-size: .75rem; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .8px; margin: 16px 0 8px; }
    .btn-fab { width: 44px; height: 44px; border-radius: 50%; background: var(--accent);
      color: #fff; border: none; font-size: 1.6rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow); transition: background .2s; }
    .btn-fab:hover { background: var(--accent-dark); }
    .btn-back { display: inline-flex; align-items: center; gap: 6px; padding: 8px 12px;
      background: none; border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); cursor: pointer; font-size: .88rem; min-height: 44px; margin-bottom: 16px; }
    .btn-back:hover { background: var(--surface2); }
    .btn-primary { width: 100%; padding: 13px; background: var(--accent); color: #fff;
      border: none; border-radius: 10px; font-size: 1rem; font-weight: 700;
      cursor: pointer; min-height: 50px; transition: background .2s; }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-secondary { width: 100%; padding: 13px; background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); border-radius: 10px; font-size: .95rem; font-weight: 600;
      cursor: pointer; min-height: 50px; margin-top: 8px; transition: background .2s; }
    .btn-secondary:hover { background: var(--border); }
    .btn-sm { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer;
      font-size: .82rem; font-weight: 600; min-height: 36px; transition: background .2s; }
    .btn-edit { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-edit:hover { background: var(--border); }
    .btn-del { background: #ffebee; color: #c62828; }
    .btn-del:hover { background: #ffcdd2; }
    [data-theme="dark"] .btn-del { background: #3e1010; color: #ef9a9a; }
    [data-theme="dark"] .btn-del:hover { background: #5a1a1a; }
    .progress-wrap { height: 4px; background: var(--border); border-radius: 2px; margin: 8px 0; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s; }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    .empty-icon { font-size: 3rem; margin-bottom: 10px; }

    /* CARDS */
    .card { background: var(--surface); border-radius: 12px; padding: 14px;
      margin-bottom: 10px; box-shadow: var(--shadow); border: 1px solid var(--border); }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .card-title { font-weight: 700; font-size: 1rem; }
    .badge { font-size: .7rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .badge-timer { background: #e8f5e9; color: #2e7d32; }
    .badge-ex    { background: #e3f2fd; color: #1565c0; }
    [data-theme="dark"] .badge-timer { background: #1b5e20; color: #a5d6a7; }
    [data-theme="dark"] .badge-ex    { background: #0d47a1; color: #90caf9; }
    .card-info { font-size: .83rem; color: var(--text-muted); margin-bottom: 8px; }
    .card-actions { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
    .img-preview { width: 100%; max-height: 140px; object-fit: cover; border-radius: 8px; margin: 6px 0; }

    /* FORMS */
    .form-card { background: var(--surface); border-radius: 12px; padding: 16px;
      box-shadow: var(--shadow); border: 1px solid var(--border); }
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: .85rem; font-weight: 600;
      color: var(--text-muted); margin-bottom: 5px; }
    .form-input, .form-textarea, .form-select {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg); color: var(--text); font-size: .95rem; min-height: 44px;
      transition: border-color .2s; font-family: inherit; }
    .form-input:focus, .form-textarea:focus, .form-select:focus
      { outline: none; border-color: var(--accent); }
    .form-textarea { min-height: 100px; resize: vertical; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* TYPE PICKER */
    .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .type-card { background: var(--surface); border: 2px solid var(--border); border-radius: 12px;
      padding: 20px 12px; text-align: center; cursor: pointer; transition: border-color .2s;
      min-height: 90px; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 8px; }
    .type-card:hover { border-color: var(--accent); background: var(--surface2); }
    .type-icon { font-size: 2rem; }
    .type-label { font-size: .9rem; font-weight: 600; }

    /* TIMER VIEW */
    .timer-view { display: flex; flex-direction: column; gap: 12px; }
    .timer-display { display: flex; align-items: center; justify-content: center;
      gap: 20px; flex-wrap: wrap; padding: 8px 0; }
    .digital-time { font-size: 2.8rem; font-weight: 800;
      font-variant-numeric: tabular-nums; letter-spacing: 2px; }
    .timer-controls { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
    .btn-ctrl { padding: 12px 4px; border: none; border-radius: 8px; font-size: .9rem;
      font-weight: 700; cursor: pointer; min-height: 48px; transition: background .2s, transform .1s; }
    .btn-ctrl:active { transform: scale(.96); }
    .ctrl-start { background: var(--accent); color: #fff; }
    .ctrl-pause { background: var(--btn-pause); color: #fff; }
    .ctrl-stop  { background: var(--btn-stop);  color: #fff; }
    .ctrl-reset { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .phase-table-wrap { background: var(--surface); border-radius: 12px; padding: 12px;
      box-shadow: var(--shadow); border: 1px solid var(--border); }
    .phase-table-wrap h3 { font-size: .9rem; color: var(--accent); margin-bottom: 8px; }
    table.ptable { width: 100%; border-collapse: collapse; font-size: .85rem; }
    .ptable thead th { color: var(--text-muted); font-weight: 600; padding: 4px 6px;
      border-bottom: 1px solid var(--border); text-align: left; }
    .ptable .prow td { padding: 6px 6px; }
    .ptable .prow.active-p { background: var(--active-row) !important; font-weight: 700; }
    .ptable .prow.done-p   { background: var(--done-row) !important; color: var(--done-text); text-decoration: line-through; }

    /* WORKOUT */
    .workout-actions { display: flex; gap: 8px; margin-top: 10px; }
    .btn-load { flex: 1; padding: 10px; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; font-weight: 700; cursor: pointer;
      min-height: 44px; font-size: .9rem; transition: background .2s; }
    .btn-load:hover { background: var(--accent-dark); }
    .slot-card { background: var(--surface); border-radius: 12px; padding: 14px;
      margin-bottom: 10px; border: 1px solid var(--border); box-shadow: var(--shadow); }
    .slot-header { font-size: .85rem; font-weight: 700; color: var(--accent); margin-bottom: 10px; }
    .slot-row { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; }

    /* PLAN */
    .plan-card { display: flex; align-items: center; gap: 12px; background: var(--surface);
      border-radius: 12px; padding: 12px; margin-bottom: 8px; border: 1px solid var(--border);
      box-shadow: var(--shadow); position: relative; }
    .plan-order { width: 24px; height: 24px; background: var(--surface2); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 700; }
    .plan-info { flex: 1; }
    .plan-name { font-weight: 700; font-size: .95rem; }
    .plan-meta { font-size: .75rem; color: var(--text-muted); }
    .plan-actions { display: flex; gap: 6px; }

    /* NOTES */
    .note-box { font-size: .82rem; font-style: italic; color: var(--text-muted);
      background: var(--surface2); padding: 8px; border-radius: 6px; margin-top: 6px;
      border-left: 3px solid var(--accent); }

    /* WORKOUT RUN */
    .run-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .run-title { font-size: 1.1rem; font-weight: 700; }
    .set-row { display: flex; align-items: center; gap: 12px; padding: 10px 0;
      border-bottom: 1px solid var(--border); }
    .set-row:last-child { border-bottom: none; }
    .set-cb { width: 28px; height: 28px; cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }
    .set-label { font-size: .9rem; flex: 1; }
    .set-label.done { text-decoration: line-through; color: var(--text-muted); }
    .btn-timer { padding: 8px 14px; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; font-size: .82rem; font-weight: 700;
      cursor: pointer; min-height: 36px; transition: background .2s; }
    .btn-timer:hover { background: var(--accent-dark); }

    /* TOAST */
    .toast { position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #333; color: #fff; padding: 10px 20px; border-radius: 24px;
      font-size: .9rem; z-index: 500; transition: transform .3s; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* MODAL SHEET */
    .sheet-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 300;
      display: flex; align-items: flex-end; }
    .sheet { background: var(--surface); width: 100%; border-radius: 16px 16px 0 0;
      padding: 20px; max-width: 700px; margin: 0 auto; }
    .sheet-title { font-size: 1rem; font-weight: 700; margin-bottom: 16px; }

    @media (max-width: 420px) {
      .digital-time { font-size: 2rem; }
      .timer-controls { grid-template-columns: repeat(2,1fr); }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body data-theme="light">

<nav class="nav">
  <span class="nav-title" id="nav-title">OSA Sport</span>
  <button class="nav-btn" id="menu-btn">&#9776;</button>
</nav>

<div class="overlay" id="overlay"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-header">Menü</div>
  <button class="drawer-item" id="m-upload">&#128228;&nbsp; Upload JSON</button>
  <button class="drawer-item" id="m-download">&#128229;&nbsp; Download JSON</button>
  <button class="drawer-item" id="m-add-workout">&#43;&nbsp; Workout erstellen</button>
  <button class="drawer-item" id="m-workouts">&#128203;&nbsp; Workouts</button>
  <button class="drawer-item" id="m-plan">&#128197;&nbsp; Plan / Queue</button>
  <button class="drawer-item" id="m-privacy">&#128712;&nbsp; Datenschutz</button>
  <button class="drawer-item" id="m-home">&#127968;&nbsp; Module</button>
  <div class="drawer-setting">
    <div class="drawer-setting-label">
      <span>Dunkelmodus</span>
      <input type="checkbox" class="toggle" id="theme-toggle">
    </div>
  </div>
  <div class="drawer-setting">
    <div class="drawer-setting-label"><span>Lautstärke</span></div>
    <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.5">
  </div>
</aside>

<input type="file" id="file-input" accept=".json" style="display:none">
<div class="toast" id="toast"></div>
<main class="main" id="main"></main>

<script>
// ── SOUNDS ──────────────────────────────────────────────────────
const SND = {
  start:  new Audio('start-sound.mp3'),
  signal: new Audio('signal-sound.mp3'),
  end:    new Audio('end-sound.mp3'),
};
function setVol(v) { Object.values(SND).forEach(s => s.volume = v); }

// ── STORAGE ─────────────────────────────────────────────────────
const SK = 'osa-app';
let S = null;
function loadS() {
  try { S = JSON.parse(localStorage.getItem(SK)) || {}; } catch { S = {}; }
  S.modules  = S.modules  || [];
  S.workouts = S.workouts || [];
  S.plan     = S.plan     || []; // Array of workout IDs
  S.theme    = S.theme    || 'light';
  S.volume   = S.volume   !== undefined ? S.volume : 0.5;
  return S;
}
function saveS() { localStorage.setItem(SK, JSON.stringify(S)); }

async function shareApp() {
  const data = JSON.stringify(S, null, 2);
  const file = new File([data], 'osa-training.json', { type: 'application/json' });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({
        files: [file],
        title: 'OSA Sport Training Export',
        text: 'Hier ist mein aktueller Trainingsstand von OSA Sport.'
      });
      toast('Erfolgreich geteilt');
    } catch (e) { if (e.name !== 'AbortError') dlJSON(); }
  } else {
    dlJSON();
  }
}
function uid() {
  return typeof crypto.randomUUID === 'function'
    ? crypto.randomUUID()
    : Date.now().toString(36) + Math.random().toString(36).slice(2);
}

// ── TOAST ───────────────────────────────────────────────────────
let _tt;
function toast(msg, ms = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), ms);
}

// ── ACTIVE TIMER ────────────────────────────────────────────────
let activeTimer = null;
function stopActiveTimer() {
  if (activeTimer?.interval) clearInterval(activeTimer.interval);
  activeTimer = null;
}

// ── ROUTER ──────────────────────────────────────────────────────
function go(view, params = {}) {
  stopActiveTimer();
  const el = document.getElementById('main');
  el.scrollTop = 0;
  const map = {
    home:          [viewHome,          bindHome],
    timerForm:     [viewTimerForm,     bindTimerForm],
    exerciseForm:  [viewExForm,        bindExForm],
    workoutCreate: [viewWorkoutCreate, bindWorkoutCreate],
    workoutList:   [viewWorkoutList,   bindWorkoutList],
    workoutRun:    [viewWorkoutRun,    bindWorkoutRun],
    plan:          [viewPlan,          bindPlan],
    privacy:       [viewPrivacy,       bindPrivacy],
    timerRun:      [viewTimerRun,      bindTimerRun],
  };
  const [render, bind] = map[view] || map.home;
  el.innerHTML = render(params);
  bind(params);
  
  // Push state for back-button handling (prevent app close)
  if (history.state?.view !== view) {
    history.pushState({ view, params }, '', '');
  }
}

// Handle Back-Button
window.addEventListener('popstate', (e) => {
  if (e.state && e.state.view) {
    // If we have a state, just go there
    go(e.state.view, e.state.params);
  } else {
    // If no state (trying to exit), ask or stay
    if (confirm('Möchtest du die App wirklich verlassen? Dein Fortschritt könnte verloren gehen.')) {
      history.back();
    } else {
      history.pushState({ view: 'home' }, '', '');
      go('home');
    }
  }
});

// Prevent accidental reload/close during active session
window.addEventListener('beforeunload', (e) => {
  if (activeTimer?.running) {
    e.preventDefault();
    e.returnValue = '';
  }
});

// ── DRAWER ──────────────────────────────────────────────────────
const overlayEl = document.getElementById('overlay');
const drawerEl  = document.getElementById('drawer');
function openDrawer()  { drawerEl.classList.add('open');  overlayEl.classList.add('open'); }
function closeDrawer() { drawerEl.classList.remove('open'); overlayEl.classList.remove('open'); }
document.getElementById('menu-btn').addEventListener('click', openDrawer);
overlayEl.addEventListener('click', closeDrawer);
document.getElementById('nav-title').addEventListener('click', () => go('home'));

function drawerGo(view) { closeDrawer(); go(view); }
document.getElementById('m-home').addEventListener('click',       () => drawerGo('home'));
document.getElementById('m-add-workout').addEventListener('click',() => drawerGo('workoutCreate'));
document.getElementById('m-workouts').addEventListener('click',   () => drawerGo('workoutList'));
document.getElementById('m-plan').addEventListener('click',       () => drawerGo('plan'));
document.getElementById('m-privacy').addEventListener('click',    () => drawerGo('privacy'));
document.getElementById('m-download').addEventListener('click',   () => { closeDrawer(); shareApp(); });
document.getElementById('m-upload').addEventListener('click',     () => { closeDrawer(); document.getElementById('file-input').click(); });

// Theme
const themeToggle = document.getElementById('theme-toggle');
themeToggle.addEventListener('change', () => {
  const theme = themeToggle.checked ? 'dark' : 'light';
  document.body.setAttribute('data-theme', theme);
  S.theme = theme; saveS();
});

// Volume
const volSlider = document.getElementById('vol-slider');
volSlider.addEventListener('input', () => {
  setVol(volSlider.value);
  S.volume = parseFloat(volSlider.value);
  saveS();
});

// Upload
document.getElementById('file-input').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (d.modules)  S.modules.push(...d.modules);
      if (d.workouts) S.workouts.push(...d.workouts);
      saveS(); go('home'); toast('Import erfolgreich');
    } catch { toast('Fehler beim Import'); }
  };
  r.readAsText(f); e.target.value = '';
});

function dlJSON() {
  const b = new Blob([JSON.stringify(S, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b); a.download = 'osa-backup.json'; a.click();
  URL.revokeObjectURL(a.href); toast('Download gestartet');
}

// ── ESCAPE ──────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── VIEW: HOME ──────────────────────────────────────────────────
function viewHome() {
  const mods = S.modules;
  let h = `<div class="view-header">
    <span class="view-title">Module</span>
    <button class="btn-fab" id="add-mod-btn" title="Modul hinzufügen">+</button>
  </div>`;
  if (!mods.length) {
    h += `<div class="empty-state"><div class="empty-icon">&#127939;</div>
      <p>Noch keine Module.<br>Tippe auf + um zu beginnen.</p></div>`;

      h += `<div class="card">

    });

}
function bindHome() {

function showTypePicker() {

}
function bindWorkoutCreate() {
  document.getElementById('back')?.addEventListener('click', () => go('home'));
  document.getElementById('save-w')?.addEventListener('click', () => {
    const name = document.getElementById('w-name')?.value.trim();
    if (!name) { toast('Bitte Name eingeben'); return; }
    const exercises = [];
    for (let i = 1; i <= 4; i++) {
      const moduleId = document.getElementById(`s-mod-${i}`)?.value;
      if (moduleId) {
        const setCnt = parseInt(document.getElementById(`s-sets-${i}`).value) || 1;
        const sets = [];
        for(let s=1; s<=setCnt; s++) sets.push({ index:s, done:false });
        exercises.push({
          moduleId,
          intensity: document.getElementById(`s-int-${i}`)?.value.trim() || '',
          note:      document.getElementById(`s-note-${i}`)?.value.trim() || '',
          sets:      sets
        });
      }
    }
    if (!exercises.length) { toast('Bitte mindestens eine Übung wählen'); return; }
    S.workouts.push({ id: uid(), name, exercises });
    saveS(); go('workoutList'); toast('Workout gespeichert');
  });
}

function bindWorkoutList() {

      const w = S.workouts.find(x => x.id === id); go('workoutRun', { workout: w });

      const idx = S.plan.indexOf(id);
      if (idx === -1) S.plan.push(id);
      else S.plan.splice(idx, 1);
      saveS(); go('workoutList');
      toast(idx === -1 ? 'Zum Plan hinzugefügt' : 'Vom Plan entfernt');
    } else if (a === 'reset') {
      const w = S.workouts.find(x => x.id === id);
      w.exercises.forEach(e => e.sets.forEach(s => s.done = false));
      saveS(); go('workoutList'); toast('Fortschritt zurückgesetzt');

      if (!confirm('Workout löschen?')) return;
      S.workouts = S.workouts.filter(x => x.id !== id);
      S.plan = S.plan.filter(x => x !== id);
      saveS(); go('workoutList'); toast('Gelöscht');
    }

function viewWorkoutRun({ workout: w }) {
  const total = w.exercises.reduce((s,e)=>s+e.sets.length,0);

    <div class="run-header">

    <div class="progress-wrap"><div class="progress-bar" id="run-bar" style="width:${pct}%"></div></div>`;
  w.exercises.forEach((ex, ei) => {
    const mod = S.modules.find(x => x.id === ex.moduleId);
    const mname = mod ? mod.name : '(gelöscht)';
    h += `<div class="card">
      <div class="card-header">
        <span class="card-title">${esc(mname)}</span>
        ${mod ? `<span class="badge ${mod.type==='timer'?'badge-timer':'badge-ex'}">${mod.type==='timer'?'Timer':'Übung'}</span>` : ''}
      </div>
      ${ex.intensity ? `<div class="card-info" style="font-weight:600">${esc(ex.intensity)}</div>` : ''}
      ${ex.note ? `<div class="note-box">${esc(ex.note)}</div>` : ''}
      ${mod?.type==='exercise'&&mod.config.imageBase64 ? `<img class="img-preview" src="${mod.config.imageBase64}" alt="">` : ''}
      ${mod?.type==='exercise'&&mod.config.description ? `<div class="card-info" style="margin-top:8px">${esc(mod.config.description)}</div>` : ''}
      <div style="margin-top:10px">`;
    ex.sets.forEach((set, si) => {
      h += `<div class="set-row">
        <input type="checkbox" class="set-cb" data-ei="${ei}" data-si="${si}" ${set.done?'checked':''}>
        <span class="set-label${set.done?' done':''}">Satz ${set.index}</span>
        ${mod?.type==='timer' ? `<button class="btn-timer" data-modid="${mod.id}" data-wid="${w.id}">&#9654; Timer</button>` : ''}
      </div>`;
    });
    h += `</div></div>`;
  });
  h += `<button class="btn-primary" id="finish-workout" style="margin-top:20px">Workout abschließen</button>`;
  return h;
}
function bindWorkoutRun({ workout: w }) {
  document.getElementById('back').addEventListener('click', () => {
    const inPlan = S.plan.includes(w.id);
    go(inPlan ? 'plan' : 'workoutList');
  });
  document.querySelectorAll('.set-cb').forEach(cb => cb.addEventListener('change', () => {
    const ei = +cb.dataset.ei, si = +cb.dataset.si;
    w.exercises[ei].sets[si].done = cb.checked;
    cb.nextElementSibling?.classList.toggle('done', cb.checked);
    const sw = S.workouts.find(x => x.id === w.id);
    if (sw) { sw.exercises[ei].sets[si].done = cb.checked; saveS(); }
    const total = w.exercises.reduce((s,e)=>s+e.sets.length,0);
    const done  = w.exercises.reduce((s,e)=>s+e.sets.filter(x=>x.done).length,0);
    document.getElementById('run-bar').style.width = Math.round(done/total*100)+'%';
    document.getElementById('run-count').textContent = `${done}/${total}`;
  }));
  document.querySelectorAll('.btn-timer').forEach(b => b.addEventListener('click', () => {
    const mod = S.modules.find(x => x.id === b.dataset.modid);
    if (mod) go('timerRun', { mod, returnTo: { view:'workoutRun', params:{ workout:w } } });
  }));
  document.getElementById('finish-workout').addEventListener('click', () => {
    const idx = S.plan.indexOf(w.id);
    if (idx !== -1) {
      // Rotate Plan: remove and push to end
      S.plan.splice(idx, 1);
      S.plan.push(w.id);
      // Optional: reset workout progress when finished in plan
      const sw = S.workouts.find(x => x.id === w.id);
      if (sw) sw.exercises.forEach(e => e.sets.forEach(s => s.done = false));
      saveS();
      toast('Plan aktualisiert: Nächstes Workout rückt nach');
      go('plan');
    } else {
      go('workoutList');
    }
  });
}

// ── VIEW: TIMER RUN ──────────────────────────────────────────────
function buildReps(mod) {
  const { exerciseDuration, pauseDuration, sets } = mod.config;
  const r = [{ Time: 3, Exercises: 'Start' }];
  for (let i = 0; i < sets; i++) {
    r.push({ Time: exerciseDuration, Exercises: mod.name });
    if (i < sets - 1 && pauseDuration > 0)
      r.push({ Time: pauseDuration, Exercises: 'Pause' });
  }
  return r;
}

  return `<button class="btn-back" id="back">&#8592; Zurück</button>
  <div class="timer-view">

      <canvas id="tc" width="200" height="200"></canvas>
    </div>
    <div class="timer-controls">
      <button class="btn-ctrl ctrl-start" id="t-start">Start</button>
      <button class="btn-ctrl ctrl-pause" id="t-pause">Pause</button>
      <button class="btn-ctrl ctrl-stop"  id="t-stop">Stopp</button>
      <button class="btn-ctrl ctrl-reset" id="t-reset">Reset</button>
    </div>
    <div class="phase-table-wrap">
      <h3>${esc(mod.name)}</h3>
      <table class="ptable">
        <thead><tr><th>Zeit</th><th>Phase</th><th>Status</th></tr></thead>
        <tbody id="phase-body"></tbody>
      </table>
    </div>
  </div>`;
}

function bindTimerRun({ mod, returnTo }) {
  document.getElementById('back').addEventListener('click', () => {
    stopActiveTimer();
    returnTo ? go(returnTo.view, returnTo.params) : go('home');
  });

  const reps = buildReps(mod);
  const canvas = document.getElementById('tc');
  const ctx    = canvas.getContext('2d');
  const CX = 100, CY = 100, R = 88;
  const phBody = document.getElementById('phase-body');

  function isDark() { return document.body.getAttribute('data-theme') === 'dark'; }
  function bgCol()  { return isDark() ? '#1a1a2e' : '#f4f4f4'; }
  function sfCol()  { return isDark() ? '#16213e' : '#ffffff'; }

  function renderPhases() {
    phBody.innerHTML = reps.map((r, i) => {
      const isPause = r.Exercises.toLowerCase() === 'pause';
      return `<tr class="prow" data-i="${i}" style="background:${isPause?'var(--pause-color)':'var(--work-color)'}">
        <td>${r.Time}s</td><td>${esc(r.Exercises)}</td>
        <td id="ps-${i}">soon</td></tr>`;
    }).join('');
  }
  renderPhases();

  function drawCircle(total, remaining, phaseName) {
    if (!total) return;
    ctx.clearRect(0, 0, 200, 200);
    const elapsed = total - remaining;
    const ang = (2 * Math.PI) / total;
    const sa  = -Math.PI / 2;
    const isPause = phaseName.toLowerCase() === 'pause';
    const isStart = phaseName.toLowerCase() === 'start';
    const exColors = ['#e53935', '#a5d6a7', '#2e7d32'];

    for (let i = 0; i < total; i++) {
      const a1 = sa + i * ang, a2 = sa + (i+1) * ang;
      ctx.beginPath(); ctx.moveTo(CX, CY);
      ctx.arc(CX, CY, R, a1, a2); ctx.closePath();
      if (i < elapsed)   ctx.fillStyle = bgCol();
      else if (isStart)  ctx.fillStyle = '#1565c0';
      else if (isPause)  ctx.fillStyle = '#388E3C';
      else               ctx.fillStyle = exColors[i % 3];
      ctx.fill();
      ctx.beginPath(); ctx.moveTo(CX, CY);
      ctx.lineTo(CX + R * Math.cos(a1), CY + R * Math.sin(a1));
      ctx.strokeStyle = bgCol(); ctx.lineWidth = 1.5; ctx.stroke();
    }
    ctx.beginPath(); ctx.arc(CX, CY, R * 0.5, 0, 2*Math.PI);
    ctx.fillStyle = sfCol(); ctx.fill();
  }

  function drawInactive() {
    ctx.clearRect(0, 0, 200, 200);
    const total = 12, ang = (2*Math.PI)/total, sa = -Math.PI/2;
    for (let i = 0; i < total; i++) {
      const a1 = sa+i*ang;
      ctx.beginPath(); ctx.moveTo(CX,CY);
      ctx.arc(CX,CY,R,a1,sa+(i+1)*ang); ctx.closePath();
      ctx.fillStyle = '#9e9e9e'; ctx.fill();
      ctx.beginPath(); ctx.moveTo(CX,CY);
      ctx.lineTo(CX+R*Math.cos(a1), CY+R*Math.sin(a1));
      ctx.strokeStyle = bgCol(); ctx.lineWidth = 1.5; ctx.stroke();
    }
    ctx.beginPath(); ctx.arc(CX,CY,R*.5,0,2*Math.PI);
    ctx.fillStyle = sfCol(); ctx.fill();
  }
  drawInactive();

  function setDT(s) {
    const m = Math.floor(s/60).toString().padStart(2,'0');
    const sec = (s%60).toString().padStart(2,'0');
    document.getElementById('dt').textContent = `${m}:${sec}`;
  }

  function updatePhaseUI(idx) {
    reps.forEach((_, i) => {
      const row = phBody.querySelector(`[data-i="${i}"]`);
      const st  = document.getElementById(`ps-${i}`);
      if (!row||!st) return;
      row.classList.remove('active-p','done-p');
      if (i < idx)      { row.classList.add('done-p');   st.textContent = 'done'; }
      else if (i===idx) { row.classList.add('active-p'); st.textContent = 'aktiv'; }
      else              { st.textContent = 'soon'; }
    });
  }

  const ts = { running:false, paused:false, idx:0, rem:0, interval:null };
  activeTimer = ts;
  let wl = null;
  async function reqWL() { try { if('wakeLock' in navigator) wl=await navigator.wakeLock.request('screen'); }catch{} }
  function relWL() { if(wl) wl.release().then(()=>wl=null); }

  function runPhase() {
    if (ts.idx >= reps.length) {
      SND.end.play(); relWL(); ts.running = false; drawInactive(); return;
    }
    const ph = reps[ts.idx];
    ts.rem = ph.Time;
    setDT(ts.rem); updatePhaseUI(ts.idx);
    drawCircle(ph.Time, ts.rem, ph.Exercises);
    SND.start.play();
    ts.interval = setInterval(() => {
      if (ts.paused) return;
      ts.rem--;
      setDT(ts.rem);
      drawCircle(ph.Time, ts.rem, ph.Exercises);
      const r = ts.rem;
      if (r > 20 && r%10===0)        SND.signal.play();
      else if (r<=20&&r>5&&r%5===0)  SND.signal.play();
      else if (r===8||r===6)          SND.signal.play();
      else if (r<=5&&r>0)             SND.signal.play();
      if (r <= 0) {
        clearInterval(ts.interval); SND.end.play();
        ts.idx++; setTimeout(runPhase, 1000);
      }
    }, 1000);
  }

  function resetState() {
    clearInterval(ts.interval);
    ts.running=false; ts.paused=false; ts.idx=0; ts.rem=0;
    relWL(); setDT(0); drawInactive(); renderPhases();
  }

  document.getElementById('t-start').addEventListener('click', () => {
    if (ts.running && !ts.paused) return;
    if (ts.paused) { ts.paused = false; return; }
    ts.running = true; ts.paused = false; ts.idx = 0;
    reqWL(); runPhase();
  });
  document.getElementById('t-pause').addEventListener('click', () => {
    if (!ts.running) return;
    ts.paused = true; relWL();
  });
  document.getElementById('t-stop').addEventListener('click',  resetState);
  document.getElementById('t-reset').addEventListener('click', resetState);

  document.addEventListener('visibilitychange', () => {
    if (wl && document.visibilityState==='visible') reqWL();
  });
}

// ── INIT ─────────────────────────────────────────────────────────
loadS();

// Apply settings
document.body.setAttribute('data-theme', S.theme);
themeToggle.checked = (S.theme === 'dark');
volSlider.value = S.volume;
setVol(S.volume);

// Migrate old sporttimer localStorage data
if (!S.modules.length) {
  try {
    const old = JSON.parse(localStorage.getItem('sporttimer') || 'null');
    if (Array.isArray(old) && old.length) {
      const exItems = old.filter(r => !['start','pause'].includes(r.Exercises.toLowerCase()));
      const paItems = old.filter(r => r.Exercises.toLowerCase()==='pause');
      if (exItems.length) {
        S.modules.push({
          id: uid(), type: 'timer', name: exItems[0].Exercises,
          config: {
            exerciseDuration: exItems[0].Time,
            pauseDuration: paItems[0]?.Time || 30,
            sets: exItems.length
          }
        });
        saveS();
      }
    }
  } catch {}
}

go('home');

if ('serviceWorker' in navigator)
  navigator.serviceWorker.register('service-worker.js');
</script>
</body>
